<div class="login-page" id="loginPage"><div class="login-card"><div class="top-line"></div><div class="logo-wrap"><span class="login-avatar">🌿</span></div><h1>龚家湾业绩统计系统</h1><p class="sub">个人业绩 · 透明公开 · 实时查看</p><div class="field"><label>姓名</label><input type="text" id="loginName" placeholder="请输入您的姓名" autocomplete="username"></div><div class="field"><label>登录密码</label><input type="password" id="loginPass" placeholder="请输入密码（默认 123456）" autocomplete="current-password"></div><div class="field" style="display:flex;align-items:center;gap:8px;margin-bottom:20px"><input type="checkbox" id="rememberPwd" style="width:18px;height:18px;accent-color:#c9a845;cursor:pointer"><label for="rememberPwd" style="margin:0;cursor:pointer;font-size:14px;color:#8b6d4b">记住密码</label></div><div class="err" id="loginErr"></div><button class="login-btn" id="loginBtn">登 录</button><div class="hint">💡 首次登录默认密码为 123456</div></div></div>
<div class="app" id="app"><div class="header"><div class="left"><span class="hdr-avatar" id="hdrAvatar">🌿</span><span class="sys-name">龚家湾业绩统计</span></div><div class="right"><span class="user-badge">👤 <strong id="curName"></strong><span class="role-tag" id="roleTag"></span></span><button class="header-btn" id="btnChPwd">🔑 修改密码</button><button class="header-btn" id="btnLogout">退出</button></div></div>
<div class="tabs" id="tabBar"><button class="active" data-tab="my">📋 我的业绩</button><button data-tab="summary">📊 汇总总表</button><button data-tab="admin" style="display:none" id="tabAdminBtn">⚙️ 后台管理</button></div>
<div id="tabMy"><div class="total-card" id="totalCard"></div><div class="card"><h3><span class="icon-dot"></span>业绩明细</h3><div class="kpi-grid" id="kpiGrid"></div></div></div>
<div id="tabSummary" style="display:none"><div class="card"><h3><span class="icon-dot"></span>全员业绩汇总总表 <span style="font-weight:400;font-size:12px;color:#b5976e;margin-left:6px">（只读，不可修改）</span></h3><div class="summary-tbl" id="summaryTbl"></div></div></div>
<div id="tabAdmin" style="display:none"><div class="card"><h3><span class="icon-dot"></span>后台管理</h3><div class="admin-grid" id="adminGrid"></div></div></div></div>
<div class="pwd-overlay" id="pwdOverlay"><div class="pwd-box"><div class="pwd-top-line"></div><h4>🔑 修改密码</h4><input type="password" id="newPwd" placeholder="请输入新密码"><div class="pwd-msg" id="pwdMsg"></div><div class="btns"><button class="btn-cancel" id="btnPwdCancel">取消</button><button class="btn-save" id="btnPwdSave">保存</button></div></div></div>
<div class="admin-toast" id="adminToast" style="opacity:0"></div>
<script>
var API="";var me=null;var allData=null;var empAvatars={"肖景文":"🐱","徐敏":"🐰","车增平":"🐻","石方平":"🦊","任玉洁":"🌸","段兴乾":"🐶","王安奎":"🐼","钟旭东":"🦁","成婷婷":"🐨","樊蕾娟":"🐯","李辉":"🐮","彭瑜婷":"👑"};
function toast(msg,ok){var t=document.getElementById("adminToast");t.textContent=msg;t.className="admin-toast "+(ok?"toast-ok":"toast-err");t.style.opacity="1";setTimeout(function(){t.style.opacity="0"},2200)}
function api(url,body){return fetch(API+url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}).then(function(r){return r.json()})}
function init(){console.log("init started");API=window.location.origin;var saved=localStorage.getItem("gjw_creds");if(saved){try{var c=JSON.parse(saved);document.getElementById("loginName").value=c.n||"";document.getElementById("loginPass").value=c.p||"";document.getElementById("rememberPwd").checked=true}catch(e){}}fetch(API+"/api/init").then(function(r){return r.json()}).then(function(d){allData=d}).catch(function(){document.getElementById("loginErr").textContent="无法连接服务器"})}

document.getElementById("loginBtn").addEventListener("click",function(){console.log("login button clicked");var n=document.getElementById("loginName").value.trim();var p=document.getElementById("loginPass").value.trim();var err=document.getElementById("loginErr");err.textContent="";if(!n){err.textContent="请输入姓名";return}if(!p){err.textContent="请输入密码";return}if(document.getElementById("rememberPwd").checked){localStorage.setItem("gjw_creds",JSON.stringify({n:n,p:p}))}else{localStorage.removeItem("gjw_creds")}fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:n,pass:p})}).then(function(r){return r.json()}).then(function(d){if(d.ok){me=d;document.getElementById("loginPage").style.display="none";document.getElementById("app").style.display="block";document.getElementById("curName").textContent=me.name;document.getElementById("hdrAvatar").textContent=empAvatars[me.name]||"🌿";if(me.isBoss){document.getElementById("roleTag").textContent="行长";document.getElementById("tabAdminBtn").style.display="inline-block";document.getElementById("tabMy").innerHTML='<div class="card"><div class="boss-welcome"><span class="boss-icon">🏛️</span><h2>'+me.name+' 行长，您好</h2><p>您可查看全员业绩汇总总表，并在【后台管理】中修改人员、考核项目和数据</p></div></div>';if(!allData){api("/api/init").then(function(d){allData=d;renderAdmin()})}else{renderAdmin()}else{document.getElementById("roleTag").textContent="员工"}renderSummary();renderMy();switchTab(me.isBoss?"summary":"my")}else{err.textContent=d.msg||"登录失败";localStorage.removeItem("gjw_creds")}}).catch(function(){err.textContent="网络错误"})});
document.getElementById("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("loginBtn").click()});
document.getElementById("btnChPwd").addEventListener("click",function(){document.getElementById("pwdOverlay").classList.add("show");document.getElementById("newPwd").value="";document.getElementById("pwdMsg").textContent="";setTimeout(function(){document.getElementById("newPwd").focus()},100)});document.getElementById("btnPwdCancel").addEventListener("click",function(){document.getElementById("pwdOverlay").classList.remove("show")});document.getElementById("btnPwdSave").addEventListener("click",function(){var np=document.getElementById("newPwd").value.trim();if(!np||np.length<4){document.getElementById("pwdMsg").textContent="密码至少4位";return}var body={name:me.name,pass:me.pass,newPass:np,isBoss:me.isBoss,empId:me.empId};fetch(API+"/api/change-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.json()}).then(function(d){if(d.ok){me.pass=np;document.getElementById("pwdOverlay").classList.remove("show");toast("密码修改成功",true);if(document.getElementById("rememberPwd").checked){var saved=JSON.parse(localStorage.getItem("gjw_creds")||"{}");saved.p=np;localStorage.setItem("gjw_creds",JSON.stringify(saved))}}else{document.getElementById("pwdMsg").textContent=d.msg||"修改失败"}}).catch(function(){document.getElementById("pwdMsg").textContent="网络错误"})});document.getElementById("pwdOverlay").addEventListener("click",function(e){if(e.target===this)this.classList.remove("show")});document.getElementById("newPwd").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("btnPwdSave").click()});document.getElementById("btnLogout").addEventListener("click",function(){me=null;document.getElementById("app").style.display="none";document.getElementById("loginPage").style.display="flex";document.getElementById("loginName").value="";document.getElementById("loginPass").value="";document.getElementById("loginErr").textContent="";document.getElementById("tabAdminBtn").style.display="none"});
document.querySelectorAll(".tabs button").forEach(function(b){b.addEventListener("click",function(){switchTab(this.dataset.tab)})});
function switchTab(tab){document.getElementById("tabMy").style.display=(tab==="my")?"block":"none";document.getElementById("tabSummary").style.display=(tab==="summary")?"block":"none";document.getElementById("tabAdmin").style.display=(tab==="admin")?"block":"none";document.querySelectorAll(".tabs button").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab)});if(tab==="admin"&&allData)renderAdmin()}
function renderMy(){if(!me||me.isBoss)return;var cats=allData.categories;var items=[];var idx=0;cats.forEach(function(cat){cat.items.forEach(function(it){items.push({name:it,category:cat.name,value:me.data[idx]||0,notes:me.notes?me.notes[idx]||"":""});idx++})});var total=0;items.forEach(function(it){total+=it.value});document.getElementById("totalCard").innerHTML='<div class="item"><div class="big">'+total.toLocaleString()+'</div><div class="lbl">业绩总计</div></div><div class="item"><div class="big">'+items.length+'</div><div class="lbl">考核项目</div></div>';var catClass={"贷款类奖励":"cat-loan","个存/对公账户类奖励":"cat-deposit","网金类奖励":"cat-online","惩罚扣减":"cat-penalty"};var h='<div class="perf-legend"><span>📋 项目名称</span><span>🔢 数量</span><span>📝 备注</span><span>📐 核算标准</span></div>';items.forEach(function(it,i){var cc=catClass[it.category]||"";var s=allData.itemStandards[it.name]||"";h+='<div class="editable-row"><span class="e-cat '+cc+'">'+it.category.substring(0,4)+'</span><span class="e-name">'+it.name+'</span><input class="e-val" type="number" id="ev'+i+'" value="'+it.value+'" onchange="markDirty()"><input class="e-note" id="en'+i+'" value="'+(it.notes||"").replace(/"/g,"&quot;")+'" placeholder="备注" onchange="markDirty()"><span class="e-std">'+s+'</span></div>'});h+='<div class="save-all-bar"><button class="save-all-btn" id="saveAllBtn" onclick="saveAll()">💾 保存修改</button></div>';document.getElementById("kpiGrid").innerHTML=h;dirty=false;updateSaveBtn()}
function renderSummary(){var cats=allData.categories,emps=allData.employees,totalItems=0,gi=0,cells=[];cats.forEach(function(c){totalItems+=c.items.length;cells.push({cat:c.name,len:c.items.length,items:[]});c.items.forEach(function(it){cells[cells.length-1].items.push(it)})});var thead="<tr><th class='row-header' rowspan='2'>序号</th><th class='row-header' rowspan='2'>姓名</th>";cells.forEach(function(cell){thead+="<th class='cat-hdr' colspan='"+cell.len+"'>"+cell.cat+"</th>"});thead+="<th class='row-header sum-hdr' rowspan='2'>奖励金额</th></tr><tr>";cells.forEach(function(cell){cell.items.forEach(function(it){thead+="<th class='item-hdr'>"+it+"</th>"})});thead+="</tr>";var tbody="";emps.forEach(function(emp,i){var row="<tr>",sum=0;row+="<td class='seq-col'>"+(i+1)+"</td><td class='name-col'>"+emp.name+"</td>";emp.data.forEach(function(v){row+="<td>"+(v||0)+"</td>";sum+=v});row+="<td style='font-weight:700;color:#8b3a3a'>"+sum+"</td></tr>";tbody+=row});var trow='<tr class="row-sum"><td class="seq-col" style="background:#e8e0d0!important">-</td><td class="name-col">合计</td>';for(var i=0;i<totalItems;i++){var cs=0;emps.forEach(function(e){cs+=(e.data[i]||0)});trow+="<td>"+cs+"</td>"}var gt=0;emps.forEach(function(e){e.data.forEach(function(v){gt+=v})});trow+="<td>"+gt+"</td></tr>";tbody+=trow;document.getElementById("summaryTbl").innerHTML="<table><thead>"+thead+"</thead><tbody>"+tbody+"</tbody></table>"}
function renderAdmin(){
var h='<div class="admin-section"><h4>👑 行长信息</h4><div class="admin-row"><input id="aBossName" value="'+me.name+'"><button class="admin-btn btn-gold" onclick="aRenameBoss()">修改姓名</button></div></div>';
h+='<div class="admin-section"><h4>👥 员工管理</h4><div class="admin-row"><input id="aNewEmp" placeholder="新员工姓名"><button class="admin-btn btn-gold" onclick="aAddEmp()">添加员工</button></div><div class="admin-list" id="aEmpList"></div></div>';
h+='<div class="admin-section"><h4>📂 考核分类与项目</h4><div class="admin-row"><input id="aNewCat" placeholder="新分类名称"><button class="admin-btn btn-gold" onclick="aAddCat()">添加分类</button></div><div class="admin-list" id="aCatList" style="max-height:400px"></div></div>';
h+='<div class="admin-section"><h4>📝 编辑业绩数据</h4><div class="admin-row"><select id="aDataEmp"></select><select id="aDataItem"></select><input type="number" id="aDataVal" value="0" style="max-width:80px"><button class="admin-btn btn-gold" onclick="aUpdateData()">更新</button></div></div>';
function renderACatList(){var h="",gi=0;allData.categories.forEach(function(cat,ci){h+="<div style='padding:8px 0;border-bottom:1px solid #f0e4cc'><div style='display:flex;justify-content:space-between;margin-bottom:6px'><strong>"+cat.name+"</strong><button class='admin-btn btn-danger' style='padding:4px 10px;font-size:11px' onclick='aDelCat(\""+cat.name+"\")'>删分类</button></div>";cat.items.forEach(function(it){var itEsc=it.replace(/\\/g,"\\\\").replace(/"/g,'\\"');h+="<div class='list-row'><span>📌 "+it+"</span><span style='color:#b5976e;font-size:11px'>("+(allData.itemStandards[it]||"")+")</span><button class='admin-btn btn-danger' style='padding:4px 10px;font-size:11px' onclick='aDelItem(\""+cat.name+"\",\""+itEsc+"\","+gi+")'>删</button></div>";gi++});h+="<div class='admin-row' style='margin-top:8px'><input id='aNewItem"+ci+"' placeholder='新考核项目'><input id='aStd"+ci+"' placeholder='标准' style='max-width:110px'><button class='admin-btn btn-gold' style='padding:6px 12px;font-size:11px' onclick='aAddItem("+ci+")'>+ 添加</button></div></div>"});document.getElementById("aCatList").innerHTML=h}function adminAuth(){return{bossName:me.name,bossPass:me.bossPass||""}}function refreshAll(){api("/api/init").then(function(d){allData=d;renderMy();renderSummary();renderAdmin()})}
}
function renderAEmpList(){var h="";allData.employees.forEach(function(e,i){h+='<div class="list-row"><span>'+e.name+'</span><div style="display:flex;gap:6px"><input id="aRename'+i+'" value="'+e.name+'" style="width:90px;padding:6px 8px;font-size:12px"><button class="admin-btn btn-gold" style="padding:6px 10px;font-size:11px" onclick="aRename('+i+')">改</button><button class="admin-btn btn-danger" style="padding:6px 10px;font-size:11px" onclick="aDelEmp('+i+')">删</button></div></div>'});document.getElementById("aEmpList").innerHTML=h}
function renderACatList(){var h="",gi=0;allData.categories.forEach(function(cat,ci){h+="<div style='padding:8px 0;border-bottom:1px solid #f0e4cc'><div style='display:flex;justify-content:space-between;margin-bottom:6px'><strong>"+cat.name+"</strong><button class='admin-btn btn-danger' style='padding:4px 10px;font-size:11px' onclick='aDelCat(\""+cat.name+"\")'>删分类</button></div>";cat.items.forEach(function(it){var itEsc=it.replace(/"/g,"&quot;").replace(/'/g,"&#39;");h+="<div class='list-row'><span>📌 "+it+"</span><span style='color:#b5976e;font-size:11px'>("+(allData.itemStandards[it]||"")+")</span><button class='admin-btn btn-danger' style='padding:4px 10px;font-size:11px' onclick='aDelItem(\""+cat.name+"\",\""+itEsc+"\","+gi+")'>删</button></div>";gi++});h+="<div class='admin-row' style='margin-top:8px'><input id='aNewItem"+ci+"' placeholder='新考核项目'><input id='aStd"+ci+"' placeholder='标准' style='max-width:110px'><button class='admin-btn btn-gold' style='padding:6px 12px;font-size:11px' onclick='aAddItem("+ci+")'>+ 添加</button></div></div>"});document.getElementById("aCatList").innerHTML=h}
function renderADataSelects(){var s="";allData.employees.forEach(function(e,i){s+='<option value="'+i+'">'+e.name+'</option>'});document.getElementById("aDataEmp").innerHTML=s;s="";var gi=0;allData.categories.forEach(function(cat){cat.items.forEach(function(it){s+='<option value="'+gi+'">'+cat.name.substring(0,4)+'-'+it+'</option>';gi++})});document.getElementById("aDataItem").innerHTML=s}
function aRenameBoss(){var n=document.getElementById("aBossName").value.trim();if(!n)return toast("姓名不能为空");var a=adminAuth();a.newName=n;api("/api/admin/rename-boss",a).then(function(d){if(d.ok){me.name=n;document.getElementById("curName").textContent=n;refreshAll();toast("已更新",true)}else{toast(d.msg)}})}
function aAddEmp(){var n=document.getElementById("aNewEmp").value.trim();if(!n)return toast("请输入姓名");var a=adminAuth();a.newName=n;api("/api/admin/add-employee",a).then(function(d){if(d.ok){refreshAll();document.getElementById("aNewEmp").value="";toast("已添加",true)}else{toast(d.msg)}})}
function aRename(i){var n=document.getElementById("aRename"+i).value.trim();if(!n)return toast("姓名不能为空");var a=adminAuth();a.empIdx=i;a.newName=n;api("/api/admin/rename",a).then(function(d){if(d.ok){refreshAll();toast("已更新",true)}else{toast(d.msg)}})}
function aDelEmp(i){if(!confirm("确定删除 "+allData.employees[i].name+"？"))return;var a=adminAuth();a.empIdx=i;api("/api/admin/delete-employee",a).then(function(d){if(d.ok){refreshAll();toast("已删除",true)}else{toast(d.msg)}})}
function aAddCat(){var n=document.getElementById("aNewCat").value.trim();if(!n)return toast("请输入分类名");var a=adminAuth();a.catName=n;api("/api/admin/add-category",a).then(function(d){if(d.ok){refreshAll();document.getElementById("aNewCat").value="";toast("已添加",true)}else{toast(d.msg)}})}
function aDelCat(name){if(!confirm("确定删除分类 "+name+"？"))return;var a=adminAuth();a.catName=name;api("/api/admin/delete-category",a).then(function(d){if(d.ok){refreshAll();toast("已删除",true)}else{toast(d.msg)}})}
function aAddItem(ci){var n=document.getElementById("aNewItem"+ci).value.trim();var s=document.getElementById("aStd"+ci).value.trim();if(!n)return toast("请输入项目名");var a=adminAuth();a.catName=allData.categories[ci].name;a.itemName=n;a.standard=s;api("/api/admin/add-item",a).then(function(d){if(d.ok){refreshAll();document.getElementById("aNewItem"+ci).value="";document.getElementById("aStd"+ci).value="";toast("已添加",true)}else{toast(d.msg)}})}
function aDelItem(cn,inn,gi){if(!confirm("确定删除 "+inn+"？"))return;var a=adminAuth();a.catName=cn;a.itemName=inn;a.globalIdx=gi;api("/api/admin/delete-item",a).then(function(d){if(d.ok){refreshAll();toast("已删除",true)}else{toast(d.msg)}})}
function aUpdateData(){var ei=parseInt(document.getElementById("aDataEmp").value);var ii=parseInt(document.getElementById("aDataItem").value);var v=parseInt(document.getElementById("aDataVal").value)||0;var a=adminAuth();a.empIdx=ei;a.itemIdx=ii;a.value=v;api("/api/admin/update-data",a).then(function(d){if(d.ok){refreshAll();toast("数据已更新",true)}else{toast(d.msg)}})}
var dirty=false;function markDirty(){dirty=true;updateSaveBtn()}function updateSaveBtn(){var b=document.getElementById("saveAllBtn");if(!b)return;if(dirty){b.textContent="💾 保存修改";b.className="save-all-btn"}else{b.textContent="✅ 已保存";b.className="save-all-btn saved"}}function saveAll(){if(!me||me.isBoss)return;var cats=allData.categories;var totalItems=0;cats.forEach(function(c){totalItems+=c.items.length});var promises=[];for(var i=0;i<totalItems;i++){var ve=document.getElementById("ev"+i);var ne=document.getElementById("en"+i);if(!ve)continue;var v=parseInt(ve.value)||0;var note=ne?ne.value:"";if(v!==(me.data[i]||0)||note!==(me.notes?me.notes[i]||"":"")){promises.push(api("/api/update-my-data",{empId:me.empId,pass:me.pass,itemIdx:i,value:v,note:note,noteIdx:i}))}}if(promises.length===0){toast("没有需要保存的修改");return}Promise.all(promises).then(function(results){var ok=true;results.forEach(function(d){if(!d.ok)ok=false});if(ok){api("/api/my-data",{empId:me.empId,pass:me.pass}).then(function(d){if(d.ok){me.data=d.data;me.notes=d.notes||[];renderMy();toast("保存成功！",true)}})}else{toast("保存失败，请重试")}}).catch(function(){toast("网络错误")})}init();
</script>
</body></html>
