<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>龚家湾业绩统计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#333;min-height:100vh;background:#f5faf6}

/* ===== LOGIN ===== */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(170deg,#eaf7ee,#d4eedb,#f5faf6,#e8f5e9)}
.login-card{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:2px solid #d4eedb}
.login-card .logo-wrap{text-align:center;margin-bottom:12px}
.login-card .logo-wrap img{width:72px;height:72px;border-radius:50%;border:3px solid #d4eedb}
.login-card h1{text-align:center;font-size:20px;font-weight:700;color:#2d6a3f;margin-bottom:4px}
.login-card .sub{text-align:center;font-size:13px;color:#7dab8a;margin-bottom:24px}
.login-card .field{margin-bottom:14px}
.login-card .field label{display:block;font-size:14px;font-weight:600;color:#2d6a3f;margin-bottom:6px}
.login-card .field input{width:100%;padding:13px 16px;border:2px solid #d4eedb;border-radius:14px;font-size:15px;background:#f9fdfa;transition:border-color .2s}
.login-card .field input:focus{outline:none;border-color:#7ec89c;box-shadow:0 0 0 3px rgba(126,200,156,.12)}
.login-card .err{color:#c0392b;font-size:13px;text-align:center;margin-bottom:8px;min-height:18px}
.login-card .remember{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:13px;color:#5d8a6a;cursor:pointer}
.login-card .remember input{width:16px;height:16px;accent-color:#5bbb7a}
.login-card .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(74,175,106,.2)}
.login-card .login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,175,106,.3)}
.login-card .hint{text-align:center;font-size:12px;color:#8bab94;margin-top:14px}

/* ===== APP ===== */
.app{display:none;max-width:1100px;margin:0 auto;padding:16px 20px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.header{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;padding:16px 24px;border-radius:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 4px 16px rgba(74,175,106,.15)}
.header .left{display:flex;align-items:center;gap:10px}
.header .left img{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.3)}
.header .left .sys-name{font-size:17px;font-weight:700}
.header .right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.header .right .user-badge{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:14px;display:flex;align-items:center;gap:6px;font-weight:600}
.header .right .role-tag{background:#a8e6c1;color:#1a5c2e;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800}
.header .right button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 14px;border-radius:18px;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s}
.header .right button:hover{background:rgba(255,255,255,.25)}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tabs button{padding:10px 22px;border:2px solid #c8e6d0;border-radius:22px;background:#fff;color:#3d8b52;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.tabs button.active{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;border-color:transparent}

/* Cards */
.card{background:#fff;border-radius:16px;padding:20px;border:2px solid #d4eedb;box-shadow:0 2px 12px rgba(0,0,0,.03);margin-bottom:14px}
.card h3{font-size:15px;color:#2d6a3f;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card h3::before{content:"";width:6px;height:6px;border-radius:50%;background:#7ec89c;display:inline-block}

/* Total card */
.total-card{background:linear-gradient(135deg,#a8e6c1,#6bc98a);color:#fff;border-radius:20px;padding:24px;text-align:center;margin-bottom:14px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:20px;box-shadow:0 4px 16px rgba(107,201,138,.2)}
.total-card .item .big{font-size:40px;font-weight:800}
.total-card .item .lbl{font-size:13px;opacity:.85;margin-top:4px}

/* Summary table */
.summary-tbl{overflow-x:auto;max-height:65vh;overflow-y:auto;border-radius:12px;border:2px solid #c8e6d0}
.summary-tbl table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
.summary-tbl th,.summary-tbl td{padding:8px 6px;text-align:center;border:1px solid #c8e6d0;white-space:nowrap}
.summary-tbl thead th{background:#e8f5e9;color:#2d6a3f;font-weight:700;font-size:12px;position:sticky;top:0;z-index:2}
.summary-tbl thead th.cat-hdr{background:#c8e6d0;font-size:13px;z-index:3}
.summary-tbl thead th.item-hdr{font-size:11px;font-weight:500;top:32px;white-space:normal;min-width:60px;max-width:85px;line-height:1.3}
.summary-tbl thead th.row-header{z-index:4;position:sticky;left:0;top:0}
.summary-tbl thead th.sum-hdr{z-index:3;background:#c8e6d0}
.summary-tbl tbody td{background:#fff;color:#444}
.summary-tbl tbody tr:nth-child(even) td{background:#f9fdfa}
.summary-tbl tbody tr:hover td{background:#eaf7ee!important}
.summary-tbl .name-col{position:sticky;left:0;background:#fff;font-weight:700;color:#2d6a3f;min-width:72px;z-index:1}
.summary-tbl tbody tr:nth-child(even) .name-col{background:#f9fdfa}
.summary-tbl tbody tr:hover .name-col{background:#eaf7ee!important}
.summary-tbl .seq-col{min-width:38px;color:#8bab94;font-size:12px}
.summary-tbl .row-sum td{background:#d4eedb!important;font-weight:700;border-top:2px solid #7ec89c;color:#2d6a3f;font-size:14px}
.summary-tbl .row-sum .name-col{background:#d4eedb!important}

/* Editable rows */
.editable-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #eaf7ee;flex-wrap:wrap;font-size:13px;transition:background .15s}
.editable-row:hover{background:#f9fdfa}
.editable-row .e-cat{font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;white-space:nowrap;min-width:44px;text-align:center}
.cat-loan{background:#fff3e0;color:#e65100}
.cat-deposit{background:#e8f5e9;color:#2e7d32}
.cat-online{background:#e3f2fd;color:#1565c0}
.cat-penalty{background:#fce4ec;color:#c62828}
.editable-row .e-name{flex:1;min-width:150px;font-weight:600;color:#2d6a3f}
.editable-row .e-val{width:68px;padding:7px 8px;border:2px solid #d4eedb;border-radius:10px;text-align:center;font-size:14px;font-weight:700;color:#2d6a3f;transition:border-color .2s}
.editable-row .e-val:focus{outline:none;border-color:#7ec89c;box-shadow:0 0 0 3px rgba(126,200,156,.12)}
.editable-row .e-note{width:120px;padding:7px 10px;border:2px solid #d4eedb;border-radius:10px;font-size:12px;color:#5d8a6a}
.editable-row .e-note:focus{outline:none;border-color:#7ec89c;box-shadow:0 0 0 3px rgba(126,200,156,.12)}
.editable-row .e-std{font-size:11px;color:#8bab94;min-width:70px;text-align:right}
.save-all-bar{text-align:center;margin-top:16px}
.save-all-btn{padding:12px 36px;border:none;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;box-shadow:0 4px 12px rgba(74,175,106,.2);transition:all .2s}
.save-all-btn:hover{transform:translateY(-1px)}
.save-all-btn.saved{background:#d4eedb;color:#2d6a3f;box-shadow:none}

/* Admin */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.admin-section{background:#fff;border:2px solid #d4eedb;border-radius:16px;padding:18px}
.admin-section h4{font-size:14px;color:#2d6a3f;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #d4eedb}
.admin-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.admin-row input,.admin-row select{flex:1;min-width:90px;padding:9px 12px;border:2px solid #d4eedb;border-radius:12px;font-size:13px;background:#fff}
.admin-row input:focus,.admin-row select:focus{outline:none;border-color:#7ec89c}
.admin-btn{padding:7px 14px;border:none;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,#f0c14b,#e2a83e);color:#fff}
.btn-gold:hover{box-shadow:0 4px 12px rgba(224,168,62,.3)}
.btn-danger{background:#fef0ef;color:#c94040;border:1px solid #fcc}
.btn-danger:hover{background:#ffe0de}
.btn-outline{background:#fff;border:2px solid #d4eedb;color:#2d6a3f;border-radius:16px}
.admin-list{max-height:260px;overflow-y:auto;font-size:13px}
.admin-list .list-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #eaf7ee;gap:8px}
.admin-list .list-row:hover{background:#f9fdfa}

/* Password modal */
.pwd-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
.pwd-overlay.show{display:flex}
.pwd-box{background:#fff;border-radius:20px;padding:28px 24px;width:360px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.pwd-box h4{color:#2d6a3f;text-align:center;font-size:16px;margin-bottom:16px}
.pwd-box input{width:100%;padding:12px 14px;border:2px solid #d4eedb;border-radius:12px;font-size:14px;margin-bottom:8px}
.pwd-box input:focus{outline:none;border-color:#7ec89c}
.pwd-box .btns{display:flex;gap:8px;margin-top:14px}
.pwd-box .btns button{flex:1;padding:10px;border-radius:14px;font-weight:700;cursor:pointer;border:none;font-size:14px;transition:all .2s}
.pwd-box .btn-save{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff}
.pwd-box .btn-cancel{background:#e8f5e9;color:#2d6a3f}
.pwd-box .pwd-msg{font-size:12px;text-align:center;color:#b9322a;min-height:16px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:opacity .3s}
.toast-ok{background:#4aaf6a;color:#fff}
.toast-err{background:#c0392b;color:#fff}

/* Boss welcome */
.boss-welcome{text-align:center;padding:32px 20px}
.boss-welcome .boss-icon{font-size:56px;display:block;margin-bottom:12px}
.boss-welcome h2{font-size:18px;color:#2d6a3f;margin-bottom:6px}
.boss-welcome p{color:#7dab8a;font-size:14px}

@media(max-width:600px){
  .summary-tbl th,.summary-tbl td{padding:6px 4px;font-size:11px}
  .total-card .item .big{font-size:32px}
  .login-card{padding:30px 20px}
  .header{padding:12px 16px}
  .admin-grid{grid-template-columns:1fr}
}
</style></head>

<script>
// === STATE ===
var API=window.location.origin, me=null, allData=null;

// === UTILS ===
function toast(msg,ok){
  var t=document.getElementById("adminToast");
  t.textContent=msg;t.className="toast "+(ok?"toast-ok":"toast-err");
  t.style.opacity="1";setTimeout(function(){t.style.opacity="0"},2000);
}
function api(url,body){
  return fetch(API+url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}).then(function(r){return r.json()});
}
function adminAuth(){
  return{bossName:me.name,bossPass:me.bossPass||""};
}

// === INIT ===
function init(){
  var saved=localStorage.getItem("gjw_creds");
  if(saved){try{var c=JSON.parse(saved);document.getElementById("loginName").value=c.n||"";document.getElementById("loginPass").value=c.p||"";document.getElementById("rememberPwd").checked=true}catch(e){}}
  fetch(API+"/api/init").then(function(r){return r.json()}).then(function(d){allData=d}).catch(function(){document.getElementById("loginErr").textContent="无法连接服务器"});
}

// === LOGIN ===
document.getElementById("loginBtn").addEventListener("click",function(){
  var n=document.getElementById("loginName").value.trim();
  var p=document.getElementById("loginPass").value.trim();
  var err=document.getElementById("loginErr");
  err.textContent="";
  if(!n){err.textContent="请输入姓名";return}
  if(!p){err.textContent="请输入密码";return}
  if(document.getElementById("rememberPwd").checked){
    localStorage.setItem("gjw_creds",JSON.stringify({n:n,p:p}));
  }else{localStorage.removeItem("gjw_creds")}
  fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:n,pass:p})})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.ok){
      me=d;
      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("curName").textContent=me.name;
      if(me.isBoss){
        document.getElementById("roleTag").textContent="行长";
        document.getElementById("tabAdminBtn").style.display="inline-block";
        document.getElementById("tabMy").innerHTML='<div class="card"><div class="boss-welcome"><span class="boss-icon">🏛️</span><h2>'+me.name+' 行长，您好</h2><p>您可查看全员业绩汇总总表，并在【后台管理】中修改人员、考核项目和数据</p></div></div>';
        if(allData){renderAdmin();}
      }else{
        document.getElementById("roleTag").textContent="员工";
      }
      renderSummary();
      renderMy();
      switchTab(me.isBoss?"summary":"my");
    }else{
      err.textContent=d.msg||"登录失败";
      localStorage.removeItem("gjw_creds");
    }
  }).catch(function(){err.textContent="网络错误"});
});
document.getElementById("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("loginBtn").click();});

// === LOGOUT ===
document.getElementById("btnLogout").addEventListener("click",function(){

  document.getElementById("app").style.display="none";
  document.getElementById("loginPage").style.display="flex";
  document.getElementById("loginName").value="";

// === CHANGE PASSWORD ===
document.getElementById("btnChPwd").addEventListener("click",function(){
  document.getElementById("pwdOverlay").classList.add("show");
  document.getElementById("newPwd").value="";
  document.getElementById("pwdMsg").textContent="";
  setTimeout(function(){document.getElementById("newPwd").focus()},100);
});
document.getElementById("btnPwdCancel").addEventListener("click",function(){document.getElementById("pwdOverlay").classList.remove("show");});
document.getElementById("btnPwdSave").addEventListener("click",function(){

    if(d.ok){
      me.pass=np;
      document.getElementById("pwdOverlay").classList.remove("show");

      if(document.getElementById("rememberPwd").checked){

  }).catch(function(){document.getElementById("pwdMsg").textContent="网络错误"});

document.getElementById("pwdOverlay").addEventListener("click",function(e){if(e.target===this)this.classList.remove("show");});
document.getElementById("newPwd").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("btnPwdSave").click();});

// === TABS ===
document.querySelectorAll(".tabs button").forEach(function(b){b.addEventListener("click",function(){switchTab(this.dataset.tab);});});
function switchTab(tab){
  document.getElementById("tabMy").style.display=(tab==="my")?"block":"none";
  document.getElementById("tabSummary").style.display=(tab==="summary")?"block":"none";
  document.getElementById("tabAdmin").style.display=(tab==="admin")?"block":"none";
  document.querySelectorAll(".tabs button").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab);});
  if(tab==="admin"&&me&&me.isBoss&&allData)renderAdmin();
}

// === MY PERFORMANCE ===
var dirty=false;
function renderMy(){
  if(!me||me.isBoss)return;
  var cats=allData.categories,items=[],idx=0;
  cats.forEach(function(cat){cat.items.forEach(function(it){items.push({name:it,category:cat.name,value:me.data[idx]||0,notes:me.notes?me.notes[idx]||"":""});idx++})});
  var total=0;items.forEach(function(it){total+=it.value});
  document.getElementById("totalCard").innerHTML='<div class="item"><div class="big">'+total.toLocaleString()+'</div><div class="lbl">业绩总计</div></div><div class="item"><div class="big">'+items.length+'</div><div class="lbl">考核项目</div></div>';
  var catClass={"贷款类奖励":"cat-loan","个存/对公账户类奖励":"cat-deposit","网金类奖励":"cat-online","惩罚扣减":"cat-penalty"};
  var h='<div style="font-size:12px;color:#8bab94;margin-bottom:10px;display:flex;gap:12px;padding:0 4px"><span style="width:44px"></span><span style="flex:1">考核项目</span><span style="width:68px;text-align:center">数量</span><span style="width:120px">备注</span><span style="width:70px;text-align:right">核算标准</span></div>';
  items.forEach(function(it,i){
    var cc=catClass[it.category]||"";
    var s=allData.itemStandards[it.name]||"";
    h+='<div class="editable-row"><span class="e-cat '+cc+'">'+it.category.substring(0,4)+'</span><span class="e-name">'+it.name+'</span><input class="e-val" type="number" id="ev'+i+'" value="'+it.value+'" onchange="markDirty()"><input class="e-note" id="en'+i+'" value="'+(it.notes||"").replace(/"/g,"&quot;")+'" placeholder="备注" onchange="markDirty()"><span class="e-std">'+s+'</span></div>';
  });
  h+='<div class="save-all-bar"><button class="save-all-btn" id="saveAllBtn" onclick="saveAll()">💾 保存修改</button></div>';
  document.getElementById("kpiGrid").innerHTML=h;
  dirty=false;updateSaveBtn();
}
function markDirty(){dirty=true;updateSaveBtn();}
function updateSaveBtn(){
  var b=document.getElementById("saveAllBtn");if(!b)return;
  if(dirty){b.textContent="💾 保存修改";b.className="save-all-btn"}else{b.textContent="✅ 已保存";b.className="save-all-btn saved"}
}
function saveAll(){
  if(!me||me.isBoss)return;
  var totalItems=0;allData.categories.forEach(function(c){totalItems+=c.items.length});
  var promises=[];
  for(var i=0;i<totalItems;i++){
    var ve=document.getElementById("ev"+i),ne=document.getElementById("en"+i);
    if(!ve)continue;
    var v=parseInt(ve.value)||0,n=ne?ne.value:"";
    if(v!==(me.data[i]||0)||n!==(me.notes?me.notes[i]||"":"")){
      promises.push(api("/api/update-my-data",{empId:me.empId,pass:me.pass,itemIdx:i,value:v,note:n,noteIdx:i}));
    }
  }
  if(promises.length===0){toast("没有需要保存的修改");return}
  Promise.all(promises).then(function(results){
    var ok=true;results.forEach(function(d){if(!d.ok)ok=false});
    if(ok){api("/api/my-data",{empId:me.empId,pass:me.pass}).then(function(d){if(d.ok){me.data=d.data;me.notes=d.notes||[];renderMy();toast("保存成功！",true)}})}
    else{toast("保存失败",false)}
  }).catch(function(){toast("网络错误")});
}

// === SUMMARY TABLE ===
function renderSummary(){
  var cats=allData.categories,emps=allData.employees,totalItems=0,cells=[];
  cats.forEach(function(c){totalItems+=c.items.length;c.items.forEach(function(it){cells.push(it)});});
  var thead='<tr><th class="row-header" rowspan="2">序号</th><th class="row-header" rowspan="2">姓名</th>';
  var catIdx=0;
  cats.forEach(function(cat){
    thead+='<th class="cat-hdr" colspan="'+cat.items.length+'">'+cat.name+'</th>';
  });
  thead+='<th class="row-header sum-hdr" rowspan="2">合计</th></tr><tr>';
  cells.forEach(function(it){thead+='<th class="item-hdr">'+it+'</th>'});
  thead+='</tr>';
  var tbody="";
  emps.forEach(function(emp,i){
    var row='<tr><td class="seq-col">'+(i+1)+'</td><td class="name-col">'+emp.name+'</td>',sum=0;
    emp.data.forEach(function(v){row+='<td>'+(v||0)+'</td>';sum+=v});
    row+='<td style="font-weight:700;color:#1a5c2e">'+sum+'</td></tr>';
    tbody+=row;
  });
  var trow='<tr class="row-sum"><td class="seq-col">-</td><td class="name-col">合计</td>';
  for(var i=0;i<totalItems;i++){var cs=0;emps.forEach(function(e){cs+=(e.data[i]||0)});trow+='<td>'+cs+'</td>'}
  var gt=0;emps.forEach(function(e){e.data.forEach(function(v){gt+=v})});trow+='<td>'+gt+'</td></tr>';
  tbody+=trow;
  document.getElementById("summaryTbl").innerHTML='<table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
}

// === ADMIN ===
function renderAdmin(){
  if(!allData)return;
  var h='<div class="admin-section"><h4>👑 行长信息</h4><div class="admin-row"><input id="aBossName" value="'+me.name+'"><button class="admin-btn btn-gold" onclick="aRenameBoss()">修改姓名</button></div></div>';
  h+='<div class="admin-section"><h4>👥 员工管理</h4><div class="admin-row"><input id="aNewEmp" placeholder="新员工姓名"><button class="admin-btn btn-gold" onclick="aAddEmp()">添加员工</button></div><div class="admin-list" id="aEmpList"></div></div>';
  h+='<div class="admin-section"><h4>📂 考核分类与项目</h4><div class="admin-row"><input id="aNewCat" placeholder="新分类名称"><button class="admin-btn btn-gold" onclick="aAddCat()">添加分类</button></div><div class="admin-list" id="aCatList" style="max-height:400px"></div></div>';
  h+='<div class="admin-section"><h4>📝 编辑业绩数据</h4><div class="admin-row"><select id="aDataEmp"></select><select id="aDataItem"></select><input type="number" id="aDataVal" value="0" style="max-width:80px"><button class="admin-btn btn-gold" onclick="aUpdateData()">更新</button></div></div>';
  h+='<div class="admin-section" style="text-align:center"><h4>⚠️ 危险操作</h4><p style="font-size:12px;color:#999;margin-bottom:8px">重置所有员工数据为0，考核项目恢复默认</p><button class="admin-btn btn-danger" style="padding:8px 20px" onclick="resetAll()">🔄 重置全部数据</button></div>';
  document.getElementById("adminGrid").innerHTML=h;
  renderAEmpList();
  renderACatList();
  renderADataSelects();
}

function renderAEmpList(){
  var h="";
  allData.employees.forEach(function(e,i){
    h+='<div class="list-row"><span>'+e.name+'</span><div style="display:flex;gap:6px"><input id="aRename'+i+'" value="'+e.name+'" style="width:80px;padding:4px 8px;font-size:12px;border:1px solid #d4eedb;border-radius:8px"><button class="admin-btn btn-outline" style="padding:3px 8px;font-size:11px" onclick="aRename('+i+')">改名</button><button class="admin-btn btn-danger" style="padding:3px 8px;font-size:11px" onclick="aDelEmp('+i+')">删除</button></div></div>';
  });
  document.getElementById("aEmpList").innerHTML=h;
}

function renderACatList(){
  var h="",gi=0;
  allData.categories.forEach(function(cat,ci){
    h+='<div style="padding:8px 0;border-bottom:1px solid #d4eedb"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><strong style="color:#2d6a3f">'+cat.name+'</strong><button class="admin-btn btn-danger" style="padding:3px 8px;font-size:11px" onclick="aDelCat(\''+cat.name+'\')">删分类</button></div>';
    cat.items.forEach(function(it){
      h+='<div class="list-row"><span>📌 '+it+'</span><span style="color:#8bab94;font-size:11px">('+(allData.itemStandards[it]||"")+')</span><button class="admin-btn btn-danger" style="padding:3px 8px;font-size:11px" onclick="aDelItem(\''+cat.name+'\',\''+it+'\','+gi+')">删</button></div>';
      gi++;
    });
    h+='<div class="admin-row" style="margin-top:8px"><input id="aNewItem'+ci+'" placeholder="新考核项目"><input id="aStd'+ci+'" placeholder="标准" style="max-width:100px"><button class="admin-btn btn-gold" style="padding:5px 10px;font-size:11px" onclick="aAddItem('+ci+')">+ 添加</button></div></div>';
  });
  document.getElementById("aCatList").innerHTML=h;
}

function renderADataSelects(){
  var s="";allData.employees.forEach(function(e,i){s+='<option value="'+i+'">'+e.name+'</option>'});document.getElementById("aDataEmp").innerHTML=s;
  s="";var gi=0;allData.categories.forEach(function(cat){cat.items.forEach(function(it){s+='<option value="'+gi+'">'+cat.name.substring(0,4)+'-'+it+'</option>';gi++})});document.getElementById("aDataItem").innerHTML=s;
}

function aRenameBoss(){var n=document.getElementById("aBossName").value.trim();if(!n)return toast("姓名不能为空");api("/api/admin/rename-boss",Object.assign(adminAuth(),{newName:n})).then(function(d){if(d.ok){me.name=n;document.getElementById("curName").textContent=n;refreshAll();toast("已更新",true)}else{toast(d.msg)}})}
function aAddEmp(){var n=document.getElementById("aNewEmp").value.trim();if(!n)return toast("请输入姓名");api("/api/admin/add-employee",Object.assign(adminAuth(),{newName:n})).then(function(d){if(d.ok){refreshAll();document.getElementById("aNewEmp").value="";toast("已添加",true)}else{toast(d.msg)}})}
function aRename(i){var n=document.getElementById("aRename"+i).value.trim();if(!n)return toast("姓名不能为空");var a=adminAuth();a.empIdx=i;a.newName=n;api("/api/admin/rename",a).then(function(d){if(d.ok){refreshAll();toast("已更新",true)}else{toast(d.msg)}})}
function aDelEmp(i){if(!confirm("确定删除 "+allData.employees[i].name+"？"))return;var a=adminAuth();a.empIdx=i;api("/api/admin/delete-employee",a).then(function(d){if(d.ok){refreshAll();toast("已删除",true)}else{toast(d.msg)}})}
function aAddCat(){var n=document.getElementById("aNewCat").value.trim();if(!n)return toast("请输入分类名");api("/api/admin/add-category",Object.assign(adminAuth(),{catName:n})).then(function(d){if(d.ok){refreshAll();document.getElementById("aNewCat").value="";toast("已添加",true)}else{toast(d.msg)}})}
function aDelCat(name){if(!confirm("确定删除分类 "+name+"？"))return;api("/api/admin/delete-category",Object.assign(adminAuth(),{catName:name})).then(function(d){if(d.ok){refreshAll();toast("已删除",true)}else{toast(d.msg)}})}
function aAddItem(ci){var n=document.getElementById("aNewItem"+ci).value.trim();var s=document.getElementById("aStd"+ci).value.trim();if(!n)return toast("请输入项目名");var a=adminAuth();a.catName=allData.categories[ci].name;a.itemName=n;a.standard=s;api("/api/admin/add-item",a).then(function(d){if(d.ok){refreshAll();toast("已添加",true)}else{toast(d.msg)}})}
function aDelItem(cn,inn,gi){if(!confirm("确定删除 "+inn+"？"))return;var a=adminAuth();a.catName=cn;a.itemName=inn;a.globalIdx=gi;api("/api/admin/delete-item",a).then(function(d){if(d.ok){refreshAll();toast("已删除",true)}else{toast(d.msg)}})}
function aUpdateData(){var ei=parseInt(document.getElementById("aDataEmp").value);var ii=parseInt(document.getElementById("aDataItem").value);var v=parseInt(document.getElementById("aDataVal").value)||0;api("/api/admin/update-data",Object.assign(adminAuth(),{empIdx:ei,itemIdx:ii,value:v})).then(function(d){if(d.ok){refreshAll();toast("数据已更新",true)}else{toast(d.msg)}})}

function refreshAll(){fetch(API+"/api/init").then(function(r){return r.json()}).then(function(d){allData=d;renderMy();renderSummary();renderAdmin()})}

function resetAll(){if(!confirm("确定要重置所有数据吗？所有员工的业绩数量将归零，考核项目恢复默认。此操作不可撤销！"))return;api("/api/admin/reset",adminAuth()).then(function(d){if(d.ok){refreshAll();toast("数据已重置",true)}else{toast(d.msg||"重置失败")}})}

init();
</script>
</body></html>
