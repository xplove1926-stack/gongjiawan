<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>龚家湾业绩统计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:#333;min-height:100vh;background:#f5faf6}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(170deg,#eaf7ee,#d4eedb,#f5faf6,#e8f5e9);position:relative;overflow:hidden}
.login-card{position:relative;z-index:1;background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.05);border:2px solid #d4eedb}
.login-logo{text-align:center;margin-bottom:8px}
.login-logo img{width:72px;height:72px;border-radius:50%;border:3px solid #d4eedb;object-fit:cover}
.login-card h1{text-align:center;font-size:20px;font-weight:700;color:#2d6a3f;margin-bottom:2px}
.login-card .sub{text-align:center;font-size:13px;color:#7dab8a;margin-bottom:20px}
.login-card .field{margin-bottom:12px}
.login-card .field label{display:block;font-size:14px;font-weight:600;color:#2d6a3f;margin-bottom:5px}
.login-card .field input{width:100%;padding:12px 14px;border:2px solid #d4eedb;border-radius:14px;font-size:15px;background:#f9fdfa}
.login-card .field input:focus{outline:none;border-color:#7ec89c}
.login-card .err{color:#c0392b;font-size:13px;text-align:center;min-height:18px}
.login-card .remember{display:flex;align-items:center;gap:8px;font-size:13px;color:#5d8a6a;cursor:pointer;user-select:none}
.login-card .remember input[type=checkbox]{width:16px;height:16px;accent-color:#5bbb7a}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px}
.login-btn:hover{transform:translateY(-1px)}
.login-card .hint{text-align:center;font-size:12px;color:#8bab94;margin-top:12px}
.lg-d{position:absolute;font-size:28px;pointer-events:none;opacity:.12}
.lg-d.d1{top:8%;left:8%}.lg-d.d2{top:18%;right:10%}.lg-d.d3{bottom:15%;left:12%}.lg-d.d4{bottom:22%;right:8%}
.app{display:none;max-width:1200px;margin:0 auto;padding:14px 18px;animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.header{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;padding:12px 20px;border-radius:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.h-left{display:flex;align-items:center;gap:10px}
.h-left img{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.3);object-fit:cover}
.sys-name{font-size:17px;font-weight:700}
.h-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-badge{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:14px;display:flex;align-items:center;gap:6px;font-weight:600}
.role-tag{background:#a8e6c1;color:#1a5c2e;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800}
.h-btn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.2);padding:7px 14px;border-radius:18px;font-size:13px;cursor:pointer;font-weight:600}
.h-btn:hover{background:rgba(255,255,255,.28)}
.mbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 16px;background:#fff;border-radius:14px;border:2px solid #d4eedb;flex-wrap:wrap}
.mbar label{font-weight:700;color:#2d6a3f;font-size:14px}
.mbar select{padding:8px 14px;border:2px solid #c8e6d0;border-radius:12px;font-size:14px;color:#2d6a3f;background:#f9fdfa;font-weight:600;cursor:pointer}
.mbar select:focus{outline:none;border-color:#7ec89c}
.mbar .add-m{padding:8px 14px;border:2px dashed #c8e6d0;border-radius:12px;font-size:13px;cursor:pointer;color:#7dab8a;background:transparent;font-weight:600}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tabs button{padding:9px 20px;border:2px solid #c8e6d0;border-radius:22px;background:#fff;color:#3d8b52;font-size:14px;font-weight:700;cursor:pointer}
.tabs button:hover{border-color:#7ec89c;background:#f0faf3}
.tabs button.active{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff;border-color:transparent}
.card{background:#fff;border-radius:16px;padding:18px 20px;border:2px solid #d4eedb;margin-bottom:12px}
.card h3{font-size:15px;color:#2d6a3f;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3::before{content:"";width:5px;height:5px;border-radius:50%;background:#7ec89c;display:inline-block;flex-shrink:0}
.sum-wrap{overflow-x:auto;max-height:60vh;overflow-y:auto;border-radius:12px;border:2px solid #c8e6d0}
.sum-wrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.sum-wrap th,.sum-wrap td{padding:7px 6px;text-align:center;border:1px solid #c8e6d0;white-space:nowrap}
.sum-wrap thead th{background:#e8f5e9;color:#2d6a3f;font-weight:700;font-size:11px;position:sticky;top:0;z-index:2}
.sum-wrap .cat-hdr{background:#c8e6d0;font-size:12px;z-index:3}
.sum-wrap .item-hdr{font-size:10px;font-weight:500;top:30px;min-width:50px;max-width:75px;line-height:1.3}
.sum-wrap .row-hdr{z-index:4;position:sticky;left:0;top:0}
.sum-wrap tbody td{background:#fff;color:#444}
.sum-wrap tbody tr:nth-child(even) td{background:#f9fdfa}
.sum-wrap tbody tr:hover td{background:#eaf7ee!important}
.s-name{position:sticky;left:0;background:#fff;font-weight:700;color:#2d6a3f;min-width:65px;z-index:1}
.sum-wrap tbody tr:nth-child(even) .s-name{background:#f9fdfa}
.sum-wrap tbody tr:hover .s-name{background:#eaf7ee!important}
.s-seq{min-width:34px;color:#8bab94;font-size:11px}
.row-total td{background:#d4eedb!important;font-weight:700;border-top:2px solid #7ec89c;color:#2d6a3f}
.row-total .s-name{background:#d4eedb!important}
.score-cell{color:#1a5c2e;font-weight:700;font-size:13px}
.te-cat{border:1px solid #d4eedb;border-radius:12px;padding:12px;margin-bottom:10px;background:#f9fdfa}
.te-cat h4{color:#2d6a3f;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.te-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;flex-wrap:wrap}
.te-row input{padding:5px 8px;border:1px solid #d4eedb;border-radius:6px;font-size:12px;background:#fff}
.te-row input:focus{outline:none;border-color:#7ec89c}
.te-row .te-name{flex:2;min-width:120px}
.te-row .te-score{width:60px;text-align:center}
.te-row .te-std{flex:1;min-width:80px}
.te-row .te-del{color:#c94040;cursor:pointer;font-size:14px;padding:0 4px}
.te-add{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.te-add input{padding:6px 10px;border:1px dashed #c8e6d0;border-radius:8px;font-size:12px;flex:1;min-width:80px;background:transparent}
.te-add input:focus{outline:none;border-color:#7ec89c}
.tg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.tg-card{background:#f9fdfa;border:2px solid #d4eedb;border-radius:14px;padding:14px}
.tg-card h5{color:#2d6a3f;font-size:13px;margin-bottom:8px}
.tg-rw{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px}
.tg-rw span{flex:1;color:#555}
.tg-rw input{width:50px;padding:4px 6px;border:1px solid #d4eedb;border-radius:6px;text-align:center;font-size:12px}
.tg-rw input:focus{outline:none;border-color:#7ec89c}
.entry-f{display:flex;gap:8px;flex-wrap:wrap;padding:14px;background:#f9fdfa;border:1px solid #d4eedb;border-radius:14px;margin-bottom:14px}
.entry-f input,.entry-f select{padding:9px 12px;border:2px solid #d4eedb;border-radius:10px;font-size:13px;background:#fff}
.entry-f input:focus,.entry-f select:focus{outline:none;border-color:#7ec89c}
.entry-f .ef-d{width:130px}.entry-f .ef-t{flex:2;min-width:140px}.entry-f .ef-q{width:65px}.entry-f .ef-n{flex:1;min-width:100px}
.entry-lst{max-height:50vh;overflow-y:auto}
.entry-lst table{width:100%;border-collapse:collapse;font-size:12px}
.entry-lst th{background:#e8f5e9;color:#2d6a3f;padding:8px 6px;text-align:center;border:1px solid #c8e6d0;position:sticky;top:0}
.entry-lst td{padding:7px 6px;border:1px solid #c8e6d0;text-align:center}
.entry-lst tr:hover td{background:#f0faf3}
.edel{color:#c94040;cursor:pointer;font-weight:700}
.pstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.pstat{background:linear-gradient(135deg,#a8e6c1,#6bc98a);color:#fff;border-radius:16px;padding:16px 20px;text-align:center}
.pstat .big{font-size:32px;font-weight:800}.pstat .lbl{font-size:12px;opacity:.85;margin-top:4px}
.mptbl{width:100%;border-collapse:collapse;font-size:13px;border:2px solid #c8e6d0;border-radius:12px;overflow:hidden}
.mptbl th{background:#e8f5e9;color:#2d6a3f;font-weight:700;padding:9px 8px;border:1px solid #c8e6d0;font-size:12px}
.mptbl td{padding:8px;border:1px solid #c8e6d0;text-align:center;background:#fff}
.mptbl tr:nth-child(even) td{background:#f9fdfa}
.mptbl .cat-r td{background:#d4eedb;color:#1a5c2e;font-weight:700;font-size:13px;text-align:left;padding-left:10px}
.mptbl .hit{color:#2d6a3f}.mptbl .miss{color:#c94040}
.ag{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.as{background:#fff;border:2px solid #d4eedb;border-radius:16px;padding:18px}
.as h4{font-size:14px;color:#2d6a3f;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #d4eedb}
.ar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ar input,.ar select{flex:1;min-width:90px;padding:8px 12px;border:2px solid #d4eedb;border-radius:12px;font-size:13px;background:#fff}
.ar input:focus{outline:none;border-color:#7ec89c}
.abtn{padding:7px 14px;border:none;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.abtn-g{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff}
.abtn-r{background:#fef0ef;color:#c94040;border:1px solid #fcc}
.abtn-o{background:#fff;border:2px solid #d4eedb;color:#2d6a3f}
.alist{max-height:300px;overflow-y:auto;font-size:13px}
.alist .lr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid #eaf7ee;gap:8px;flex-wrap:wrap}
.alist .lr:hover{background:#f9fdfa}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:22px;font-size:14px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.toast-ok{background:#d4eedb;color:#1a5c2e;border:1px solid #7ec89c}
.toast-err{background:#fef0ef;color:#c94040;border:1px solid #fcc}
.pwd-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.25);z-index:100;align-items:center;justify-content:center}
.pwd-ov.show{display:flex}
.pwd-bx{background:#fff;border-radius:20px;padding:28px 24px;width:360px;max-width:90vw}
.pwd-bx h4{color:#2d6a3f;text-align:center;font-size:16px;margin-bottom:6px}
.pwd-bx .ph{text-align:center;font-size:12px;color:#8bab94;margin-bottom:12px}
.pwd-bx input{width:100%;padding:12px 14px;border:2px solid #d4eedb;border-radius:12px;font-size:14px;margin-bottom:8px;background:#f9fdfa}
.pwd-bx input:focus{outline:none;border-color:#7ec89c}
.pwd-bx .btns{display:flex;gap:8px;margin-top:14px}
.pwd-bx .btns button{flex:1;padding:10px;border-radius:14px;font-weight:700;cursor:pointer;border:none;font-size:14px}
.pwd-bx .bs{background:linear-gradient(135deg,#7ec89c,#4aaf6a);color:#fff}
.pwd-bx .bc{background:#e8f5e9;color:#2d6a3f}
.pwd-bx .msg{font-size:13px;text-align:center;min-height:18px}
@media(max-width:700px){.login-card{padding:28px 18px}.header{padding:10px 14px}.sum-wrap td,.sum-wrap th{padding:5px 3px;font-size:10px}}
</style></head><body>

  if(s){try{var c=JSON.parse(s);document.getElementById("lName").value=c.n||"";document.getElementById("lPass").value=c.p||"";document.getElementById("lRem").checked=true;}catch(e){}}
  fetch(A+"/api/init").then(function(r){return r.json()}).then(function(d){
    ms=d.months||[]; cm=d.currentMonth;
    if(ms.indexOf(cm)<0){ms.push(cm);ms.sort().reverse();}
    renderMSel();
  }).catch(function(){document.getElementById("lErr").textContent="⚠️ 无法连接服务器";});
})();

function renderMSel(){
  var s=document.getElementById("mSel"),h="";
  ms.forEach(function(m){h+='<option value="'+m+'"'+(m===cm?" selected":"")+'>'+m+'</option>';});
  if(ms.length===0){h='<option value="'+cm+'">'+cm+'</option>';ms=[cm];}
  s.innerHTML=h;
  document.getElementById("mStatus").textContent=s.value===new Date().toISOString().slice(0,7)?"🟢 当前月份":"📌 历史月份";
}

// ========== LOGIN ==========
document.getElementById("lBtn").onclick=doLogin;
document.getElementById("lPass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
function doLogin(){
  var n=document.getElementById("lName").value.trim(),p=document.getElementById("lPass").value.trim();
  var err=document.getElementById("lErr");err.textContent="";
  if(!n){err.textContent="请输入姓名";return;}
  if(!p){err.textContent="请输入密码";return;}
  if(document.getElementById("lRem").checked){localStorage.setItem("gjw3_c",JSON.stringify({n:n,p:p}));}
  else{localStorage.removeItem("gjw3_c");}
  api("/api/login",{name:n,pass:p}).then(function(d){
    if(d.ok){
      me=d;
      document.getElementById("loginPage").style.display="none";
      document.getElementById("app").style.display="block";
      document.getElementById("curName").textContent=me.name;
      if(me.isBoss){
        document.getElementById("roleTag").textContent="行长";
        document.getElementById("bossTabs").style.display="flex";
        document.getElementById("empTabs").style.display="none";
        document.getElementById("btnNewM").style.display="inline-block";
        switchTab("summary");
      }else{
        document.getElementById("roleTag").textContent="员工";
        document.getElementById("empTabs").style.display="flex";
        document.getElementById("bossTabs").style.display="none";
        document.getElementById("btnNewM").style.display="none";
        switchTab("entry");
      }
      loadData();
    }else{err.textContent=d.msg||"姓名或密码错误";}
  }).catch(function(){err.textContent="⚠️ 网络错误";});
}

// ========== MONTH SELECTOR ==========
document.getElementById("mSel").onchange=function(){cm=this.value;document.getElementById("mStatus").textContent=cm===new Date().toISOString().slice(0,7)?"🟢 当前月份":"📌 历史月份";loadData();};
document.getElementById("btnNewM").onclick=function(){var m=prompt("请输入新月份（格式：YYYY-MM）：");if(!m||!/^\d{4}-\d{2}$/.test(m)){toast("格式错误，请用 YYYY-MM");return;}if(ms.indexOf(m)<0){ms.push(m);ms.sort().reverse();}cm=m;renderMSel();loadData();};

function loadData(){
  if(me.isBoss){api("/api/month-data",{month:cm}).then(function(d){md=d;renderSum();renderPlan();renderPeople();}).catch(function(e){toast("加载数据失败: "+e.message);});}
  else{api("/api/my-entries",{empId:me.empId,pass:me.pass,month:cm}).then(function(d){if(d.ok){myd=d;renderEntry();renderMyPerf();}else{toast(d.msg||"加载失败");}}).catch(function(e){toast("加载数据失败");});}
}

// ========== TAB SWITCH ==========
function switchTab(t){
  document.querySelectorAll(".tabs button[data-t]").forEach(function(b){b.classList.remove("active");});
  var tb=document.querySelector('.tabs button[data-t="'+t+'"]');if(tb)tb.classList.add("active");
  ["tsum","tplan","tpeople","tsettings","tentry","tmyperf"].forEach(function(id){document.getElementById(id).style.display="none";});
  var map={summary:"tsum",plan:"tplan",people:"tpeople",settings:"tsettings",entry:"tentry",myperf:"tmyperf"};
  var el=document.getElementById(map[t]);if(el)el.style.display="block";
}
document.querySelectorAll(".tabs button[data-t]").forEach(function(b){b.onclick=function(){switchTab(this.getAttribute("data-t"));};});

// ========== BOSS: SUMMARY (Task Editor + Progress + Employee Table) ==========
function renderSum(){
  if(!md)return;
  var tasks=md.tasks||[],emps=md.employees||[],gt=md.grandTotals||{},tt=md.totalTargets||{};

  // === CARD 1: Task Editor ===
  var cats=[],cmap={};
  tasks.forEach(function(t){var cn=t.category||"其他";if(!cmap[cn]){cmap[cn]=[];cats.push(cn);}cmap[cn].push(t);});
  var eh="";
  if(cats.length===0&&pendingCats.length===0){eh='<p style="color:#8bab94;text-align:center;padding:16px">暂未添加任务分类，请在下方创建</p>';}
  cats.forEach(function(cn,ci){
    eh+='<div class="te-cat"><h4>🌿 '+cn+' <span style="font-size:11px;color:#c94040;cursor:pointer;font-weight:400" onclick="delCategory(\''+cn.replace(/'/g,"\\'")+'\')">删除分类</span></h4>';
    cmap[cn].forEach(function(t){
      eh+='<div class="te-row">';
      eh+='<input class="te-name" value="'+t.name.replace(/"/g,"&quot;")+'" data-tid="'+t.id+'" onchange="editTaskName(\''+t.id+'\',this.value)" placeholder="项目名称">';
      eh+='<input class="te-score" type="number" value="'+(t.unitScore||t.unitScore===0?t.unitScore:"")+'" data-tid="'+t.id+'" onchange="editTaskScore(\''+t.id+'\',this.value)" placeholder="分值">';
      eh+='<input class="te-std" value="'+(t.standard||"").replace(/"/g,"&quot;")+'" data-tid="'+t.id+'" onchange="editTaskStd(\''+t.id+'\',this.value)" placeholder="核算标准">';
      eh+='<span class="te-del" onclick="delTaskById(\''+t.id+'\')">✕</span>';
      eh+='</div>';
    });
    eh+='<div class="te-add"><input id="tnm'+ci+'" placeholder="新项目名称"><input id="tsc'+ci+'" type="number" placeholder="分值" style="max-width:65px"><input id="tst'+ci+'" placeholder="标准" style="max-width:90px"><button class="abtn abtn-g" style="padding:4px 10px;font-size:11px" onclick="addItem('+ci+',\''+cn.replace(/'/g,"\\'")+'\')">+</button></div>';
    eh+='</div>';
  });
  pendingCats.forEach(function(cn,ci){var pci=cats.length+ci;eh+='<div class="te-cat"><h4>🌿 '+cn+' <span style="font-size:11px;color:#c94040;cursor:pointer;font-weight:400" onclick="removePendingCat(\\"'+cn.replace(/'/g,"\\\\\\'")+'\\")">删除</span></h4><div class="te-add"><input id="tnm"+pci+'" placeholder="新项目名称"><input id="tsc"+pci+'" type="number" placeholder="分值" style="max-width:65px"><input id="tst"+pci+'" placeholder="标准" style="max-width:90px"><button class="abtn abtn-g" style="padding:4px 10px;font-size:11px" onclick="addItem('+pci+',\\"'+cn.replace(/'/g,"\\\\\\'")+'\\")">+</button></div></div>';});eh+='<div class="te-add" style="margin-top:8px"><input id="ncn" placeholder="新分类名称"><button class="abtn abtn-g" style="padding:6px 14px;font-size:12px" onclick="addCategory()">+ 添加分类</button></div>';
  eh+='<div style="text-align:center;margin-top:10px"><button class="abtn abtn-g" onclick="saveTasks()" style="padding:10px 28px;font-size:14px">💾 保存全部任务</button></div>';
  document.getElementById("taskEd").innerHTML=eh;

  // === CARD 2: Progress Bars ===
  if(tasks.length===0){document.getElementById("progBars").innerHTML='<p style="color:#8bab94;text-align:center;padding:30px">📋 暂无任务数据</p>';document.getElementById("empTbl").innerHTML='<p style="color:#8bab94;text-align:center;padding:20px">暂无数据</p>';return;}
  var ph="";
  tasks.forEach(function(t){
    var tgt=tt[t.id]||0,dn=gt[t.id]||0,pct=tgt>0?Math.round(dn/tgt*100):(dn>0?100:0);
    var bc=pct>=100?"#6bc98a":(pct>=50?"#a8d98a":"#f0d078");
    ph+="<div style=\"display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #eaf7ee;font-size:12px\">";
    ph+="<span style=\"width:130px;color:#2d6a3f;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\" title=\""+t.name.replace(/"/g,"&quot;")+"\">"+t.name+"</span>";
    ph+="<span style=\"width:45px;text-align:right;color:#8bab94;font-size:11px\">"+tgt+"</span><span style=\"width:45px;text-align:right;font-weight:700;color:#1a5c2e\">"+dn+"</span>";
    ph+="<div style=\"flex:1;min-width:80px;height:14px;background:#e8f5e9;border-radius:7px;overflow:hidden\"><div style=\"height:100%;width:"+Math.min(pct,100)+"%;background:"+bc+";border-radius:7px;transition:width .4s\"></div></div>";
    ph+="<span style=\"width:36px;text-align:right;font-weight:700;font-size:12px;color:"+(pct>=100?"#1a5c2e":"#e67e22")+"\">"+pct+"%</span></div>";
  });
  document.getElementById("progBars").innerHTML=ph;

  // === CARD 3: Employee Detail Table ===
  var thead='<tr><th class="row-hdr" rowspan="2">#</th><th class="row-hdr" rowspan="2">姓名</th><th class="row-hdr" rowspan="2">岗位</th>';
  cats.forEach(function(cn){thead+='<th class="cat-hdr" colspan="'+(cmap[cn].length+1)+'">'+cn+'</th>';});
  thead+='<th class="row-hdr" rowspan="2">总完成</th><th class="row-hdr" rowspan="2">绩效得分</th></tr><tr>';
  cats.forEach(function(cn){cmap[cn].forEach(function(t){thead+='<th class="item-hdr">'+t.name+'</th>';});thead+='<th class="item-hdr" style="background:#d4eedb">小计</th>';});
  thead+='</tr>';
  var tbody="";
  emps.forEach(function(e,i){
    tbody+='<tr><td class="s-seq">'+(i+1)+'</td><td class="s-name">'+e.name+'</td><td style="font-size:11px;color:#8bab94">'+(e.position||"-")+'</td>';
    cats.forEach(function(cn){var s=0;cmap[cn].forEach(function(t){var v=e.completed[t.id]||0;s+=v;tbody+='<td>'+v+'</td>';});tbody+='<td style="background:#f0faf3;font-weight:700;color:#2d6a3f">'+s+'</td>';});
    tbody+='<td style="font-weight:700;color:#1a5c2e;font-size:14px">'+e.total+'</td><td class="score-cell">'+(e.totalScore||0)+'</td></tr>';
  });
  tbody+='<tr class="row-total"><td class="s-seq" style="background:#d4eedb">-</td><td class="s-name" style="background:#d4eedb">合计</td><td style="background:#d4eedb"></td>';
  var gts=0;
  cats.forEach(function(cn){var cs=0;cmap[cn].forEach(function(t){cs+=(gt[t.id]||0);});tbody+='<td style="background:#d4eedb;font-weight:700">'+cs+'</td>';});
  emps.forEach(function(e){gts+=e.totalScore||0;});
  tbody+='<td style="background:#d4eedb;font-weight:700;font-size:14px">'+md.grandTotal+'</td><td style="background:#d4eedb;font-weight:700;font-size:13px;color:#1a5c2e">'+gts+'</td></tr>';
  document.getElementById("empTbl").innerHTML='<table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
}

// --- Task Editor Actions ---
function addItem(ci,cn){
  var nm=document.getElementById("tnm"+ci).value.trim();if(!nm)return toast("请输入项目名称");
  var sc=document.getElementById("tsc"+ci).value,st=document.getElementById("tst"+ci).value.trim();
  if(!md.tasks)md.tasks=[];
  md.tasks.push({id:"t"+Date.now().toString(36),name:nm,category:cn,unitScore:sc?parseFloat(sc):null,standard:st});
  var pi=pendingCats.indexOf(cn);if(pi>=0)pendingCats.splice(pi,1);
  renderSum();
}function addCategory(){
  var nm=document.getElementById("ncn").value.trim();if(!nm)return toast("请输入分类名称");
  if(pendingCats.indexOf(nm)<0)pendingCats.push(nm);
  document.getElementById("ncn").value="";
  toast("分类已创建，请在下方添加项目",true);
  renderSum();
}
function removePendingCat(cn){var pi=pendingCats.indexOf(cn);if(pi>=0)pendingCats.splice(pi,1);renderSum();}function delTaskById(tid){if(!confirm("删除此任务？"))return;md.tasks=md.tasks.filter(function(t){return t.id!==tid;});renderSum();}
function delCategory(cn){if(!confirm("删除分类 \""+cn+"\" 及其中所有任务？"))return;md.tasks=md.tasks.filter(function(t){return t.category!==cn;});renderSum();}
function editTaskName(tid,v){var t=md.tasks.find(function(x){return x.id===tid;});if(t)t.name=v;}
function editTaskScore(tid,v){var t=md.tasks.find(function(x){return x.id===tid;});if(t)t.unitScore=v?parseFloat(v):null;}
function editTaskStd(tid,v){var t=md.tasks.find(function(x){return x.id===tid;});if(t)t.standard=v;}
function saveTasks(){
  var ts=md.tasks||[];
  api("/api/admin/save-tasks",Object.assign(adm(),{month:cm,tasks:ts})).then(function(d){
    if(d.ok){toast("✅ 已保存 "+ts.length+" 项任务",true);loadData();}else toast(d.msg||"保存失败");
  }).catch(function(e){toast("保存失败: "+e.message);});
}

// ========== BOSS: PLAN (Target Assignment) ==========
var tgDirty={};
function renderPlan(){
  if(!md)return;
  var tasks=md.tasks||[],emps=md.employees||[];
  if(tasks.length===0){document.getElementById("tgGrid").innerHTML='<p style="color:#8bab94;text-align:center;padding:30px">📋 请先在【汇总总表】中添加任务</p>';return;}
  var h="";
  emps.forEach(function(e,i){
    var tg=e.targets||{};
    h+='<div class="tg-card"><h5>👤 '+e.name+' <span style="font-size:10px;color:#8bab94;font-weight:400">'+(e.position||"未设岗位")+'</span></h5>';
    tasks.forEach(function(t){
      h+='<div class="tg-rw"><span>'+t.name+' <span style="font-size:10px;color:#8bab94">('+(t.unitScore||"--")+')</span></span>';
      h+='<input type="number" id="tgv'+i+'_'+t.id.replace(/[^a-zA-Z0-9]/g,"_")+'" value="'+(tg[t.id]||"")+'" onchange="markTG('+i+',\''+t.id+'\')" placeholder="目标">';
      h+='</div>';
    });
    h+='<button class="abtn abtn-g" style="margin-top:8px;width:100%;font-size:11px" onclick="saveTG('+i+')">💾 保存目标</button></div>';
  });
  document.getElementById("tgGrid").innerHTML=h;
}
function markTG(ei,tid){
  if(!tgDirty[ei])tgDirty[ei]={};
  var el=document.getElementById("tgv"+ei+"_"+tid.replace(/[^a-zA-Z0-9]/g,"_"));
  tgDirty[ei][tid]=el?parseInt(el.value)||0:0;
}
function saveTG(ei){
  if(!tgDirty[ei]){toast("没有修改");return;}
  api("/api/admin/save-targets",Object.assign(adm(),{month:cm,empIdx:ei,targets:tgDirty[ei]})).then(function(d){
    if(d.ok){toast("✅ 目标已保存",true);tgDirty[ei]=null;loadData();}else toast(d.msg||"保存失败");
  });
}

// ========== BOSS: PEOPLE (with position) ==========
function renderPeople(){
  api("/api/init").then(function(d){
    var emps=d.employees||[],bn=d.bossName||"";
    var h='<div class="as"><h4>👑 行长</h4><div class="ar"><input id="pbn" value="'+bn+'"><button class="abtn abtn-g" onclick="saveBN()">保存</button></div></div>';
    h+='<div class="as"><h4>👥 员工管理</h4><div class="ar" style="margin-bottom:10px"><input id="pne" placeholder="新员工姓名"><button class="abtn abtn-g" onclick="addEmp()">+ 添加</button></div><div class="alist" id="pel"></div></div>';
    document.getElementById("peopleG").innerHTML=h;
    var el="";
    emps.forEach(function(e,i){
      el+='<div class="lr"><span style="font-weight:600;min-width:60px">'+e.name+'</span>';
      el+='<input id="ppos'+i+'" value="'+(e.position||"")+'" placeholder="岗位" style="width:80px;padding:4px 6px;font-size:12px;border:1px solid #d4eedb;border-radius:6px" onchange="savePos('+i+',this.value)">';
      el+='<div style="display:flex;gap:4px"><input id="prn'+i+'" value="'+e.name+'" style="width:65px;padding:4px 6px;font-size:12px;border:1px solid #d4eedb;border-radius:6px"><button class="abtn abtn-o" style="padding:3px 8px;font-size:11px" onclick="renameEmp('+i+')">改名</button><button class="abtn abtn-r" style="padding:3px 8px;font-size:11px" onclick="delEmp('+i+')">删除</button></div></div>';
    });
    document.getElementById("pel").innerHTML=el;
  });

function saveBN(){var n=document.getElementById("pbn").value.trim();if(!n)return toast("姓名不能为空");api("/api/admin/rename-boss",Object.assign(adm(),{newName:n})).then(function(d){if(d.ok){me.name=n;document.getElementById("curName").textContent=n;toast("已更新",true);}else toast(d.msg);});}
function addEmp(){var n=document.getElementById("pne").value.trim();if(!n)return toast("请输入姓名");api("/api/admin/add-employee",Object.assign(adm(),{newName:n})).then(function(d){if(d.ok){document.getElementById("pne").value="";renderPeople();toast("已添加",true);}else toast(d.msg);});}
function savePos(i,v){api("/api/admin/update-position",Object.assign(adm(),{empIdx:i,position:v})).then(function(d){if(d.ok)toast("✅ 岗位已更新",true);});}
function renameEmp(i){var n=document.getElementById("prn"+i).value.trim();if(!n)return toast("姓名不能为空");api("/api/admin/rename",Object.assign(adm(),{empIdx:i,newName:n})).then(function(d){if(d.ok){renderPeople();toast("已更新",true);}else toast(d.msg);});}
function delEmp(i){if(!confirm("确定删除该员工？"))return;api("/api/admin/delete-employee",Object.assign(adm(),{empIdx:i})).then(function(d){if(d.ok){renderPeople();toast("已删除",true);}else toast(d.msg);});}

function doReset(){if(!confirm("⚠️ 确定重置全部数据？\n\n所有月份数据将清空，员工名单恢复默认。不可撤销！"))return;api("/api/admin/reset",adm()).then(function(d){if(d.ok){toast("✅ 已重置",true);setTimeout(function(){location.reload();},1500);}else toast(d.msg||"重置失败");});}

// ========== EMPLOYEE: ENTRY ==========
function renderEntry(){
  if(!myd)return;
  var tasks=myd.tasks||[];
  document.getElementById("efDate").value=new Date().toISOString().slice(0,10);
  var o='<option value="">选择考核项目</option>';
  tasks.forEach(function(t){o+='<option value="'+t.id+'">'+(t.category?t.category.substring(0,4)+" - ":"")+t.name+'</option>';});
  document.getElementById("efTask").innerHTML=o;document.getElementById("efQty").value="";document.getElementById("efNote").value="";
  var es=myd.entries||[];es.sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='<table><thead><tr><th>日期</th><th>考核项目</th><th>数量</th><th>备注</th><th>操作</th></tr></thead><tbody>';
  if(es.length===0){h+='<tr><td colspan="5" style="color:#8bab94;padding:20px">暂无录入记录</td></tr>';}
  else{es.forEach(function(e){var t=tasks.find(function(x){return x.id===e.taskId;});h+='<tr><td>'+e.date+'</td><td>'+(t?t.name:"已删除")+'</td><td style="font-weight:700">'+e.qty+'</td><td style="font-size:11px;color:#8bab94">'+(e.note||"")+'</td><td><span class="edel" onclick="delMyEntry(\''+e.id+'\')">✕</span></td></tr>';});}
  h+='</tbody></table>';document.getElementById("entryLst").innerHTML=h;
}
function doAddEntry(){
  var d=document.getElementById("efDate").value,tid=document.getElementById("efTask").value;
  var q=parseInt(document.getElementById("efQty").value)||0,n=document.getElementById("efNote").value.trim();
  if(!tid)return toast("请选择考核项目");if(q<=0)return toast("请输入有效数量");
  api("/api/add-entry",{empId:me.empId,pass:me.pass,month:cm,date:d,taskId:tid,qty:q,note:n}).then(function(r){
    if(r.ok){toast("✅ 录入成功",true);loadData();}else toast(r.msg||"录入失败");
  });
}
function delMyEntry(eid){if(!confirm("删除此记录？"))return;api("/api/delete-entry",{empId:me.empId,pass:me.pass,month:cm,entryId:eid}).then(function(r){if(r.ok){toast("已删除",true);loadData();}else toast(r.msg||"删除失败");});}

// ========== EMPLOYEE: MY PERFORMANCE ==========
function renderMyPerf(){
  if(!myd)return;
  var tasks=myd.tasks||[],comp=myd.completed||{},tgs=myd.targets||{};
  var tq=0,ts=0;
  Object.keys(comp).forEach(function(tid){tq+=comp[tid];var t=tasks.find(function(x){return x.id===tid;});if(t&&t.unitScore)ts+=comp[tid]*t.unitScore;});
  document.getElementById("pStats").innerHTML='<div class="pstat"><div class="big">'+tq+'</div><div class="lbl">📈 总完成数</div></div><div class="pstat"><div class="big">'+ts+'</div><div class="lbl">💰 绩效得分</div></div><div class="pstat"><div class="big">'+tasks.length+'</div><div class="lbl">📋 考核项目数</div></div>';
  var cats=[],cmap={};
  tasks.forEach(function(t){var cn=t.category||"其他";if(!cmap[cn]){cmap[cn]=[];cats.push(cn);}cmap[cn].push(t);});
  var h='<table class="mptbl"><thead><tr><th>分类</th><th>考核项目</th><th>目标</th><th>完成</th><th>剩余</th><th>完成率</th><th>分值/单位</th><th>绩效得分</th></tr></thead><tbody>';
  if(tasks.length===0){h+='<tr><td colspan="8" style="color:#8bab94;padding:20px">本月暂无任务</td></tr>';}
  else{cats.forEach(function(cn){h+='<tr class="cat-r"><td colspan="8">🌿 '+cn+'</td></tr>';cmap[cn].forEach(function(t){var c=comp[t.id]||0,tg=tgs[t.id]||0,rate=tg>0?Math.round(c/tg*100):(c>0?">100":"-");var sc=t.unitScore?(c*t.unitScore):"-",cls=c>=tg&&tg>0?"hit":"miss";var remain=tg>0?Math.max(0,tg-c):"-";h+='<tr><td></td><td style="text-align:left">'+t.name+'</td><td>'+(tg||"-")+'</td><td style="font-weight:700">'+c+'</td><td style="font-weight:700;color:'+(tg>0&&c<tg?'#c94040':'#8bab94')+'">'+remain+'</td><td class="'+cls+'">'+(typeof rate==="number"?rate+"%":rate)+'</td><td style="font-size:11px;color:#8bab94">'+(t.unitScore||"未设")+'</td><td style="font-weight:700;color:#1a5c2e">'+sc+'</td></tr>';});});}
  h+='</tbody></table>';document.getElementById("myPerfT").innerHTML=h;
}
</script></body></html>
